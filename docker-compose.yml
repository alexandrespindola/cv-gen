services:
  gotenberg:
    image: gotenberg/gotenberg:8.30.1
    container_name: gotenberg-pdf
    ports:
      - "7777:3000"
    environment:
      - GOTENBERG_DISABLE_ROUTES=health,version
      - GOTENBERG_CHROMIUM_IGNORE_CERTIFICATE_ERRORS=true
      - GOTENBERG_CHROMIUM_ALLOW_INSECURE_LOCALHOST=true
      - GOTENBERG_API_CORS_ALLOW_ORIGINS=*
      - GOTENBERG_API_CORS_ALLOW_METHODS=GET,POST,OPTIONS
      - GOTENBERG_API_CORS_ALLOW_HEADERS=Content-Type
    restart: unless-stopped
    networks:
      - pdf-network

networks:
  pdf-network:
    driver: bridge
